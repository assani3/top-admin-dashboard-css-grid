<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=contact_support,dashboard,groups,home,id_card,mail,nest_clock_farsight_analog,notifications_active,search,settings,shield,task" />
  <body>
  <div class="container">
    <div class="header">
      <div class="upper-header-left">
        
        <div class="search">
          <span class="search-icon material-symbols-outlined">search</span>
          <input type="search" class="search-input" placeholder="Search">
        </div>
      </div>

      <div class="upper-header-right">
        <div class="upper-header-right-icons">
          <span class="notification-icon material-symbols-outlined">notifications_active</span>
        </div>

        <div class="header-logo">
          <img src="/img/logo192.png" alt="Italian Trulli">
        </div>

        <div class="header-person-name">
          <p>Assani Shabani</p>
        </div>
      </div>

      <div class="lower-header-left">
        <div class="lower-header-logo">
          <img src="/img/logo192.png" alt="Italian Trulli">
        </div>

        <div class="lower-header-person-name">
          <p>I'm Assani Shabani (@assani8)</p>
        </div>
      </div>


      <div class="lower-header-right">

        <div class="lower-header-right-button">
          <p>News</p>
        </div>

        <div class="lower-header-right-button">
          Upload
        </div>
        
        <div class="lower-header-right-button">
          Share
        </div>        
      </div>      
    </div>

    <div class="sidebar">

      <div class="dashboard-icon">
        <span class="dashboard-icon material-symbols-outlined">dashboard</span>
        <p>Dashboard</p>
      </div>

      <div class="other-icons">
        <div class="sidebar-container">
         <span class="sidebar-icon material-symbols-outlined">home</span>        
         <p>Home</p>
       </div>
      
       <div class="sidebar-container">
          <span class="sidebar-icon material-symbols-outlined">id_card</span>
          <p>Profile</p>
      </div>  
      
       <div class="sidebar-container">
          <span class="sidebar-icon material-symbols-outlined">mail</span>
          <p>Messages</p>
      </div> 
      
       <div class="sidebar-container">
          <span class="sidebar-icon material-symbols-outlined">nest_clock_farsight_analog</span>
          <p>History</p>
      </div> 
      
       <div class="sidebar-container">
          <span class="sidebar-icon material-symbols-outlined">task</span>
          <p>Tasks</p>
      </div> 
      
       <div class="sidebar-container">
          <span class="sidebar-icon material-symbols-outlined">groups</span>
          <p>Communities</p>
      </div>  
      
       <div class="sidebar-container">
           <span class="sidebar-icon material-symbols-outlined">settings</span>
           <p>Settings</p>
       </div> 
      
        <div class="sidebar-container">
             <span class="sidebar-icon material-symbols-outlined">contact_support</span>
             <p>Support</p>
         </div> 
      
         <div class="sidebar-container">
            <span class="sidebar-icon material-symbols-outlined">shield</span>
            <p>Privacy</p>
        </div>       
      </div>
    </div>

    <div class="content">


    </div>


  </div>
     
      
  </body>
</html>
